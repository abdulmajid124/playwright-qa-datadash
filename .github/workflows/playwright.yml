name: Playwright QA Automation

on:
  push:
    branches:
      - main

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install

      - run: npx playwright install --with-deps

      - name: Run Playwright Script 23f3002303@ds.study.iitm.ac.in
        run: node scrape.js